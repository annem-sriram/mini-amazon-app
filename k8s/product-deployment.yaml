apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-deployment
  labels:
    app: product
spec:
  replicas: 2 # Spins up 2 identical containers for high availability
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
    spec:
      containers:
      - name: product-service
        image: yourusername/mini-amazon-product:v1.0.0 # Replace with your Docker Hub username
        ports:
        - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: product-service # This becomes the internal domain name
spec:
  type: ClusterIP # Only accessible inside the cluster
  selector:
    app: product
  ports:
  - protocol: TCP
    port: 5001
    targetPort: 5001
